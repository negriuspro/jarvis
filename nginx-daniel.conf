limit_req_zone $binary_remote_addr zone=daniel_api:10m     rate=30r/m;
limit_req_zone $binary_remote_addr zone=daniel_xscribe:10m rate=10r/m;

server {
    listen 80;
    server_name _;
    client_max_body_size 25m;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_vary on;
    gzip_types
        application/javascript
        application/json
        application/manifest+json
        application/octet-stream
        application/wasm
        image/svg+xml
        text/css
        text/javascript
        text/plain;

    location = /health {
        access_log off;
        add_header Content-Type application/json;
        return 200 "{\"status\":\"ok\"}\n";
    }

    location /ws {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
    }

    location /api/ {
        limit_req zone=daniel_api burst=10 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:8000;
    }

    location = /transcribe {
        limit_req zone=daniel_xscribe burst=5 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:8000;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
