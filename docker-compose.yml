name: asistente-daniel

services:

  nginx:
    image: nginx:1.27-alpine
    
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    ports:
      - "${APP_PORT:-3002}:80"
    volumes:
      - ./docker/nginx/reverse-proxy.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - daniel-public
      - daniel-private
    restart: unless-stopped
    mem_limit: 64m
    cpus: "0.20"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    image: daniel-frontend:latest
    
    expose:
      - "80"
    networks:
      - daniel-private
    restart: unless-stopped
    mem_limit: 64m
    cpus: "0.10"
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  backend:
    build:
      context: .
      dockerfile: server/Dockerfile
    image: daniel-backend:latest
    
    env_file:
      - .env
    environment:
      APP_ENV: production
      DOCKER_HOST: unix:///var/run/docker.sock
      DOCKER_LOG_LINES: ${DOCKER_LOG_LINES:-200}
      DOCKER_STOP_TIMEOUT: ${DOCKER_STOP_TIMEOUT:-10}
      DANIEL_ADMIN_TOKEN: ${DANIEL_ADMIN_TOKEN}
      REDIS_URL: redis://redis:6379/0
    expose:
      - "8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - daniel-data:/app/data
    networks:
      - daniel-private
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    mem_limit: 512m
    cpus: "1.50"
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  redis:
    image: redis:7.4-alpine
    
    command: >
      redis-server
      --appendonly yes
      --save 60 1
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - daniel-private
    restart: unless-stopped
    mem_limit: 160m
    cpus: "0.25"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  daniel-public:
    driver: bridge
  daniel-private:
    driver: bridge

volumes:
  redis-data:
    driver: local
  daniel-data:
    driver: local
