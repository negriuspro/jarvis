name: asistente-daniel

services:

  # ── Socket Proxy — reemplaza el acceso directo a docker.sock ──────────────
  # El backend ya NO monta /var/run/docker.sock. Operaciones permitidas: listar
  # e inspeccionar contenedores, start/stop/restart. EXEC bloqueado (sin shell).
  socket-proxy:
    image: tecnativa/docker-socket-proxy:0.3.0
    restart: unless-stopped
    mem_limit: 32m
    cpus: "0.10"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      CONTAINERS: 1   # listar, inspeccionar
      IMAGES: 0
      NETWORKS: 0
      VOLUMES: 0
      BUILD: 0
      EXEC: 0         # crítico — sin acceso shell a contenedores
      SECRETS: 0
      POST: 1         # start / stop / restart
      DELETE: 0
      INFO: 1
      VERSION: 1
    networks:
      - daniel-private
    security_opt:
      - no-new-privileges:true

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    ports:
      - "${APP_PORT:-3002}:80"
      - "${APP_PORT_HTTPS:-3443}:443"
    volumes:
      - ./docker/nginx/reverse-proxy.conf:/etc/nginx/conf.d/default.conf:ro
      - /home/angel/ssl/daniel:/etc/nginx/ssl:ro
    networks:
      - daniel-public
      - daniel-private
    restart: unless-stopped
    mem_limit: 64m
    cpus: "0.20"
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    image: daniel-frontend:latest
    expose:
      - "80"
    networks:
      - daniel-private
    restart: unless-stopped
    mem_limit: 64m
    cpus: "0.10"
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  backend:
    build:
      context: .
      dockerfile: server/Dockerfile
    image: daniel-backend:latest
    env_file:
      - .env
    environment:
      APP_ENV: production
      # socket-proxy en lugar de /var/run/docker.sock directo
      DOCKER_HOST: tcp://socket-proxy:2375
      DOCKER_LOG_LINES: ${DOCKER_LOG_LINES:-200}
      DOCKER_STOP_TIMEOUT: ${DOCKER_STOP_TIMEOUT:-10}
      DANIEL_ADMIN_TOKEN: ${DANIEL_ADMIN_TOKEN}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
    expose:
      - "8000"
    volumes:
      - daniel-data:/app/data
    networks:
      - daniel-private
    depends_on:
      redis:
        condition: service_healthy
      socket-proxy:
        condition: service_started
    restart: unless-stopped
    mem_limit: 512m
    cpus: "1.50"
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  redis:
    image: redis:7.4-alpine
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --save 60 1
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      --bind 0.0.0.0
      --protected-mode yes
    # REDISCLI_AUTH oculta la contraseña de `docker inspect` y `ps aux`
    environment:
      REDISCLI_AUTH: "${REDIS_PASSWORD}"
    volumes:
      - redis-data:/data
    networks:
      - daniel-private
    restart: unless-stopped
    mem_limit: 160m
    cpus: "0.25"
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Backup — Redis RDB cada 6h, retención 7 días ──────────────────────────
  backup:
    build:
      context: ./docker/backup
      dockerfile: Dockerfile
    restart: unless-stopped
    mem_limit: 32m
    cpus: "0.05"
    environment:
      REDIS_PASSWORD: "${REDIS_PASSWORD}"
      BACKUP_INTERVAL_SECONDS: "21600"
      BACKUP_KEEP_DAYS: "7"
    volumes:
      - redis-data:/data:ro
      - ./backups:/backups
    networks:
      - daniel-private
    depends_on:
      redis:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true

networks:
  daniel-public:
    driver: bridge
  daniel-private:
    driver: bridge

volumes:
  redis-data:
    driver: local
  daniel-data:
    driver: local
